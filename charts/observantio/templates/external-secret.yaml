{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "observantio.secretName" . }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ default (include "observantio.secretName" .) .Values.externalSecrets.targetSecretName | quote }}
    creationPolicy: Owner
  data:
  {{- range $secretKey, $remoteRef := .Values.externalSecrets.data }}
  - secretKey: {{ $secretKey | quote }}
    remoteRef:
      key: {{ $remoteRef | quote }}
  {{- end }}
{{- end }}
