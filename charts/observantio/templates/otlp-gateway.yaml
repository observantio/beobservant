{{- if .Values.otlpGateway.enabled }}
{{- $gatekeeperEnabled := .Values.gatekeeper.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "otlp-gateway-config") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: otlp_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.otlpGateway.service.port }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: otlp_gateway
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            text_format: '[%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %RESPONSE_CODE% %RESPONSE_FLAGS% route=%ROUTE_NAME% upstream=%UPSTREAM_CLUSTER% reqid=%REQ(X-REQUEST-ID)%\n'
                    route_config:
                      name: routes
                      virtual_hosts:
                        - name: otlp
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/loki/" }
                              route:
                                cluster: loki
                                prefix_rewrite: "/"
                            - match: { prefix: "/tempo/" }
                              route:
                                cluster: tempo
                                prefix_rewrite: "/"
                            - match: { prefix: "/mimir/" }
                              route:
                                cluster: mimir
                                prefix_rewrite: "/"
                            - match: { prefix: "/health" }
                              direct_response:
                                status: 200
                                body:
                                  inline_string: '{"status":"healthy","service":"otlp-gateway"}'
                    http_filters:
                      {{- if $gatekeeperEnabled }}
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          http_service:
                            server_uri:
                              uri: http://{{ include "observantio.componentFullname" (dict "root" . "name" "gatekeeper") }}:{{ .Values.gatekeeper.service.port }}
                              cluster: gateway-auth
                              timeout: 2s
                            path_prefix: /api/gateway/validate
                            authorization_request:
                              headers_to_add:
                                - key: X-Otlp-Token
                                  value: "%REQ(X-OTLP-TOKEN)%"
                            authorization_response:
                              allowed_upstream_headers:
                                patterns:
                                  - exact: "x-scope-orgid"
                          failure_mode_allow: false
                      {{- end }}
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        {{- if $gatekeeperEnabled }}
        - name: gateway-auth
          connect_timeout: 2s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: gateway-auth
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "observantio.componentFullname" (dict "root" . "name" "gatekeeper") }}
                          port_value: {{ .Values.gatekeeper.service.port }}
        {{- end }}
        - name: loki
          connect_timeout: 5s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: loki
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "observantio.componentFullname" (dict "root" . "name" "loki") }}
                          port_value: {{ .Values.loki.service.port }}
        - name: tempo
          connect_timeout: 5s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: tempo
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "observantio.componentFullname" (dict "root" . "name" "tempo") }}
                          port_value: {{ .Values.tempo.service.port }}
        - name: mimir
          connect_timeout: 5s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: mimir
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "observantio.componentFullname" (dict "root" . "name" "mimir") }}
                          port_value: {{ .Values.mimir.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "otlp-gateway") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.otlpGateway.service.type }}
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: otlp-gateway
  ports:
  - name: http
    port: {{ .Values.otlpGateway.service.port }}
    targetPort: otlp
{{- if .Values.otlpGateway.publicService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "otlp-gateway-public") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
  {{- with .Values.otlpGateway.publicService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.otlpGateway.publicService.type }}
  externalTrafficPolicy: {{ .Values.otlpGateway.publicService.externalTrafficPolicy }}
  {{- with .Values.otlpGateway.publicService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: otlp-gateway
  ports:
  - name: http
    port: {{ .Values.otlpGateway.publicService.port }}
    targetPort: otlp
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "otlp-gateway") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.otlpGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: otlp-gateway
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: otlp-gateway
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- include "observantio.podSecurityContextFor" (dict "root" . "component" .Values.otlpGateway) | nindent 8 }}
      {{- with .Values.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.scheduling.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  {{- include "observantio.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: otlp-gateway
      {{- end }}
      {{- if .Values.scheduling.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
      - maxSkew: {{ .Values.scheduling.topologySpreadConstraints.maxSkew }}
        topologyKey: {{ .Values.scheduling.topologySpreadConstraints.topologyKey }}
        whenUnsatisfiable: {{ .Values.scheduling.topologySpreadConstraints.whenUnsatisfiable }}
        labelSelector:
          matchLabels:
            {{- include "observantio.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: otlp-gateway
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: otlp-gateway
        image: "{{ .Values.otlpGateway.image.repository }}:{{ .Values.otlpGateway.image.tag }}"
        imagePullPolicy: {{ .Values.otlpGateway.image.pullPolicy }}
        args: ["-c", "/etc/envoy/envoy.yaml"]
        ports:
        - containerPort: {{ .Values.otlpGateway.service.port }}
          name: otlp
        - containerPort: 9901
          name: admin
        livenessProbe:
          tcpSocket:
            port: otlp
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: otlp
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/envoy
        resources:
          {{- toYaml .Values.otlpGateway.resources | nindent 10 }}
        securityContext:
          {{- include "observantio.containerSecurityContextFor" (dict "root" . "component" .Values.otlpGateway "name" "otlp-gateway") | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "observantio.componentFullname" (dict "root" . "name" "otlp-gateway-config") }}
{{- end }}
