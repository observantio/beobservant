{{- if .Values.notifier.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "notifier") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.notifier.replicaCount }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: notifier
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: notifier
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- include "observantio.podSecurityContextFor" (dict "root" . "component" .Values.notifier) | nindent 8 }}
      {{- with .Values.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.scheduling.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  {{- include "observantio.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: notifier
      {{- end }}
      {{- if .Values.scheduling.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
      - maxSkew: {{ .Values.scheduling.topologySpreadConstraints.maxSkew }}
        topologyKey: {{ .Values.scheduling.topologySpreadConstraints.topologyKey }}
        whenUnsatisfiable: {{ .Values.scheduling.topologySpreadConstraints.whenUnsatisfiable }}
        labelSelector:
          matchLabels:
            {{- include "observantio.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: notifier
      {{- end }}
      serviceAccountName: {{ include "observantio.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: notifier
        image: "{{ .Values.notifier.image.repository }}:{{ .Values.notifier.image.tag }}"
        imagePullPolicy: {{ .Values.notifier.image.pullPolicy }}
        {{- if .Values.notifier.tls.enabled }}
        command: ["python", "main.py"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.notifier.service.port }}
          name: http
        env:
        {{- range $k, $v := .Values.notifier.env }}
        - name: {{ $k }}
          value: {{ tpl ($v | toString) $ | quote }}
        {{- end }}
        {{- if .Values.notifier.tls.enabled }}
        - name: NOTIFIER_SSL_ENABLED
          value: "true"
        - name: NOTIFIER_SSL_CERTFILE
          value: {{ printf "%s/tls.crt" .Values.notifier.tls.mountPath | quote }}
        - name: NOTIFIER_SSL_KEYFILE
          value: {{ printf "%s/tls.key" .Values.notifier.tls.mountPath | quote }}
        - name: NOTIFIER_TLS_ENABLED
          value: "true"
        {{- end }}
        envFrom:
        - secretRef:
            name: {{ include "observantio.secretName" . }}
        {{- if .Values.notifier.tls.enabled }}
        volumeMounts:
        - name: notifier-tls
          mountPath: {{ .Values.notifier.tls.mountPath }}
          readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: {{ .Values.notifier.probes.path }}
            port: http
            {{- if .Values.notifier.tls.enabled }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: {{ .Values.notifier.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.notifier.probes.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.notifier.probes.path }}
            port: http
            {{- if .Values.notifier.tls.enabled }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: {{ .Values.notifier.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.notifier.probes.periodSeconds }}
        resources:
          {{- toYaml .Values.notifier.resources | nindent 10 }}
        securityContext:
          {{- include "observantio.containerSecurityContextFor" (dict "root" . "component" .Values.notifier "name" "notifier") | nindent 10 }}
      {{- if .Values.notifier.tls.enabled }}
      volumes:
      - name: notifier-tls
        secret:
          secretName: {{ default (include "observantio.internalTLSSecretName" .) .Values.notifier.tls.certSecretName }}
          items:
          - key: {{ .Values.notifier.tls.certKey }}
            path: tls.crt
          - key: {{ .Values.notifier.tls.keyKey }}
            path: tls.key
      {{- end }}
{{- end }}
