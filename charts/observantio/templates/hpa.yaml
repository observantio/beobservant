{{- if and .Values.observantio.enabled .Values.autoscaling.observantio.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "observantio") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "observantio.fullname" . }}-observantio
  minReplicas: {{ .Values.autoscaling.observantio.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.observantio.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.observantio.targetCPUUtilizationPercentage }}
---
{{- end }}
