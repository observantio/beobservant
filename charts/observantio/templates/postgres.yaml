{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.postgresServiceName" . }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "observantio.postgresServiceName" . }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "observantio.postgresServiceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- include "observantio.podSecurityContextFor" (dict "root" . "component" .Values.postgres) | nindent 8 }}
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "observantio.secretName" . }}
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "observantio.secretName" . }}
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: {{ include "observantio.secretName" . }}
              key: POSTGRES_DB
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
        securityContext:
          {{- include "observantio.containerSecurityContextFor" (dict "root" . "component" .Values.postgres "name" "postgres") | nindent 10 }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.postgres.storage.className }}
      storageClassName: {{ .Values.postgres.storage.className }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgres.storage.size }}
{{- end }}
