{{- $gag := .Values.grafanaAuthGateway | default (dict) -}}
{{- $gagService := (index $gag "service") | default (dict) -}}
{{- $gagImage := (index $gag "image") | default (dict) -}}
{{- $gagEnforceAuth := true -}}
{{- if hasKey $gag "enforceAuth" -}}
{{- $gagEnforceAuth = (index $gag "enforceAuth") -}}
{{- end -}}
{{- if and .Values.grafana.enabled (default true (index $gag "enabled")) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-auth-gateway-config") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
data:
  default.conf: |
    map $cookie_watchdog_token $watchdog_auth_header {
      default "";
      "~.+"   "Bearer $cookie_watchdog_token";
    }

    map $http_authorization $final_auth_header {
      default $http_authorization;
      ""      $watchdog_auth_header;
    }

    map "$final_auth_header:$cookie_watchdog_token:$cookie_access_token" $missing_auth_credentials {
      default 0;
      "::"    1;
    }

    map $http_origin $cors_origin {
      default "";
      "~^https?://localhost:5173$" $http_origin;
      "~^https?://127\\.0\\.0\\.1:5173$" $http_origin;
    }

    server {
      listen {{ default 8080 (index $gagService "port") }};
      absolute_redirect off;

      location = /healthz {
        access_log off;
        return 200 "ok\n";
      }

      location = / {
        return 302 /grafana/;
      }

      location = /_auth {
        internal;

        if ($missing_auth_credentials) { return 401; }

        proxy_pass http://{{ include "observantio.componentFullname" (dict "root" . "name" "observantio") }}:{{ .Values.observantio.service.port }}/api/grafana/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /grafana/ {
        if ($request_method = OPTIONS) {
          add_header Access-Control-Allow-Origin $cors_origin always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
          add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With" always;
          add_header Vary "Origin" always;
          return 204;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary "Origin" always;

        {{- if $gagEnforceAuth }}
        auth_request /_auth;

        auth_request_set $webauth_user   $upstream_http_x_webauth_user;
        auth_request_set $webauth_tenant $upstream_http_x_webauth_tenant;
        auth_request_set $webauth_role   $upstream_http_x_webauth_role;
        auth_request_set $webauth_email  $upstream_http_x_webauth_email;
        auth_request_set $webauth_name   $upstream_http_x_webauth_name;
        {{- end }}

        proxy_pass http://{{ include "observantio.componentFullname" (dict "root" . "name" "grafana") }}:{{ .Values.grafana.service.port }};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /grafana;
        {{- if $gagEnforceAuth }}
        proxy_set_header X-WEBAUTH-USER $webauth_user;
        proxy_set_header X-WEBAUTH-TENANT $webauth_tenant;
        proxy_set_header X-WEBAUTH-ROLE $webauth_role;
        proxy_set_header X-WEBAUTH-EMAIL $webauth_email;
        proxy_set_header X-WEBAUTH-NAME $webauth_name;
        {{- end }}
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-auth-gateway") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  type: {{ default "ClusterIP" (index $gagService "type") }}
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-auth-gateway
  ports:
  - name: http
    port: {{ default 8080 (index $gagService "port") }}
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-auth-gateway") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ default 1 (index $gag "replicaCount") }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana-auth-gateway
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana-auth-gateway
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- include "observantio.podSecurityContextFor" (dict "root" . "component" $gag) | nindent 8 }}
      {{- with .Values.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.scheduling.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  {{- include "observantio.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: grafana-auth-gateway
      {{- end }}
      {{- if .Values.scheduling.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
      - maxSkew: {{ .Values.scheduling.topologySpreadConstraints.maxSkew }}
        topologyKey: {{ .Values.scheduling.topologySpreadConstraints.topologyKey }}
        whenUnsatisfiable: {{ .Values.scheduling.topologySpreadConstraints.whenUnsatisfiable }}
        labelSelector:
          matchLabels:
            {{- include "observantio.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: grafana-auth-gateway
      {{- end }}
      containers:
      - name: grafana-auth-gateway
        image: "{{ default "nginx" (index $gagImage "repository") }}:{{ default "1.27-alpine" (index $gagImage "tag") }}"
        imagePullPolicy: {{ default "IfNotPresent" (index $gagImage "pullPolicy") }}
        ports:
        - name: http
          containerPort: {{ default 8080 (index $gagService "port") }}
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          {{- toYaml ((index $gag "resources") | default (dict)) | nindent 10 }}
        securityContext:
          {{- include "observantio.containerSecurityContextFor" (dict "root" . "component" $gag "name" "grafana-auth-gateway") | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-auth-gateway-config") }}
{{- end }}
