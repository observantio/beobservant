apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observantio.fullname" . }}-secrets
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.POSTGRES_PASSWORD | quote }}
  POSTGRES_DB: {{ .Values.secrets.POSTGRES_DB | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.JWT_SECRET_KEY | quote }}
  DATA_ENCRYPTION_KEY: {{ .Values.secrets.DATA_ENCRYPTION_KEY | quote }}
  DEFAULT_OTLP_TOKEN: {{ .Values.secrets.DEFAULT_OTLP_TOKEN | quote }}
  OTEL_OTLP_TOKEN: {{ .Values.secrets.OTEL_OTLP_TOKEN | quote }}
  INBOUND_WEBHOOK_TOKEN: {{ .Values.secrets.INBOUND_WEBHOOK_TOKEN | quote }}
  OTLP_INGEST_TOKEN: {{ .Values.secrets.OTLP_INGEST_TOKEN | quote }}
  GATEWAY_INTERNAL_SERVICE_TOKEN: {{ .Values.secrets.GATEWAY_INTERNAL_SERVICE_TOKEN | quote }}
  GATEWAY_STATUS_OTLP_TOKEN: {{ .Values.secrets.GATEWAY_STATUS_OTLP_TOKEN | quote }}
  NOTIFIER_SERVICE_TOKEN: {{ .Values.secrets.NOTIFIER_SERVICE_TOKEN | quote }}
  NOTIFIER_EXPECTED_SERVICE_TOKEN: {{ .Values.secrets.NOTIFIER_EXPECTED_SERVICE_TOKEN | quote }}
  NOTIFIER_CONTEXT_SIGNING_KEY: {{ .Values.secrets.NOTIFIER_CONTEXT_SIGNING_KEY | quote }}
  NOTIFIER_CONTEXT_VERIFY_KEY: {{ .Values.secrets.NOTIFIER_CONTEXT_VERIFY_KEY | quote }}
  RESOLVER_SERVICE_TOKEN: {{ .Values.secrets.RESOLVER_SERVICE_TOKEN | quote }}
  RESOLVER_EXPECTED_SERVICE_TOKEN: {{ .Values.secrets.RESOLVER_EXPECTED_SERVICE_TOKEN | quote }}
  RESOLVER_CONTEXT_SIGNING_KEY: {{ .Values.secrets.RESOLVER_CONTEXT_SIGNING_KEY | quote }}
  RESOLVER_CONTEXT_VERIFY_KEY: {{ .Values.secrets.RESOLVER_CONTEXT_VERIFY_KEY | quote }}
  GRAFANA_USERNAME: {{ .Values.secrets.GRAFANA_USERNAME | quote }}
  GRAFANA_PASSWORD: {{ .Values.secrets.GRAFANA_PASSWORD | quote }}
  GRAFANA_API_KEY: {{ .Values.secrets.GRAFANA_API_KEY | quote }}
