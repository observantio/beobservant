{{- if .Values.secrets.create }}
{{- $notifierServiceToken := required "secrets.NOTIFIER_SERVICE_TOKEN is required when secrets.create=true" .Values.secrets.NOTIFIER_SERVICE_TOKEN }}
{{- $resolverServiceToken := required "secrets.RESOLVER_SERVICE_TOKEN is required when secrets.create=true" .Values.secrets.RESOLVER_SERVICE_TOKEN }}
{{- $notifierExpectedToken := default $notifierServiceToken .Values.secrets.NOTIFIER_EXPECTED_SERVICE_TOKEN }}
{{- $resolverExpectedToken := default $resolverServiceToken .Values.secrets.RESOLVER_EXPECTED_SERVICE_TOKEN }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observantio.secretName" . }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ required "secrets.POSTGRES_USER is required when secrets.create=true" .Values.secrets.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.POSTGRES_PASSWORD is required when secrets.create=true" .Values.secrets.POSTGRES_PASSWORD | quote }}
  POSTGRES_DB: {{ required "secrets.POSTGRES_DB is required when secrets.create=true" .Values.secrets.POSTGRES_DB | quote }}
  JWT_SECRET_KEY: {{ required "secrets.JWT_SECRET_KEY is required when secrets.create=true" .Values.secrets.JWT_SECRET_KEY | quote }}
  JWT_PRIVATE_KEY: {{ required "secrets.JWT_PRIVATE_KEY is required when secrets.create=true" .Values.secrets.JWT_PRIVATE_KEY | quote }}
  JWT_PUBLIC_KEY: {{ required "secrets.JWT_PUBLIC_KEY is required when secrets.create=true" .Values.secrets.JWT_PUBLIC_KEY | quote }}
  DATA_ENCRYPTION_KEY: {{ required "secrets.DATA_ENCRYPTION_KEY is required when secrets.create=true" .Values.secrets.DATA_ENCRYPTION_KEY | quote }}
  DEFAULT_OTLP_TOKEN: {{ required "secrets.DEFAULT_OTLP_TOKEN is required when secrets.create=true" .Values.secrets.DEFAULT_OTLP_TOKEN | quote }}
  OTEL_OTLP_TOKEN: {{ required "secrets.OTEL_OTLP_TOKEN is required when secrets.create=true" .Values.secrets.OTEL_OTLP_TOKEN | quote }}
  INBOUND_WEBHOOK_TOKEN: {{ required "secrets.INBOUND_WEBHOOK_TOKEN is required when secrets.create=true" .Values.secrets.INBOUND_WEBHOOK_TOKEN | quote }}
  OTLP_INGEST_TOKEN: {{ required "secrets.OTLP_INGEST_TOKEN is required when secrets.create=true" .Values.secrets.OTLP_INGEST_TOKEN | quote }}
  GATEWAY_INTERNAL_SERVICE_TOKEN: {{ required "secrets.GATEWAY_INTERNAL_SERVICE_TOKEN is required when secrets.create=true" .Values.secrets.GATEWAY_INTERNAL_SERVICE_TOKEN | quote }}
  GATEWAY_STATUS_OTLP_TOKEN: {{ required "secrets.GATEWAY_STATUS_OTLP_TOKEN is required when secrets.create=true" .Values.secrets.GATEWAY_STATUS_OTLP_TOKEN | quote }}
  NOTIFIER_SERVICE_TOKEN: {{ $notifierServiceToken | quote }}
  NOTIFIER_EXPECTED_SERVICE_TOKEN: {{ $notifierExpectedToken | quote }}
  NOTIFIER_CONTEXT_SIGNING_KEY: {{ required "secrets.NOTIFIER_CONTEXT_SIGNING_KEY is required when secrets.create=true" .Values.secrets.NOTIFIER_CONTEXT_SIGNING_KEY | quote }}
  NOTIFIER_CONTEXT_VERIFY_KEY: {{ required "secrets.NOTIFIER_CONTEXT_VERIFY_KEY is required when secrets.create=true" .Values.secrets.NOTIFIER_CONTEXT_VERIFY_KEY | quote }}
  RESOLVER_SERVICE_TOKEN: {{ $resolverServiceToken | quote }}
  RESOLVER_EXPECTED_SERVICE_TOKEN: {{ $resolverExpectedToken | quote }}
  RESOLVER_CONTEXT_SIGNING_KEY: {{ required "secrets.RESOLVER_CONTEXT_SIGNING_KEY is required when secrets.create=true" .Values.secrets.RESOLVER_CONTEXT_SIGNING_KEY | quote }}
  RESOLVER_CONTEXT_VERIFY_KEY: {{ required "secrets.RESOLVER_CONTEXT_VERIFY_KEY is required when secrets.create=true" .Values.secrets.RESOLVER_CONTEXT_VERIFY_KEY | quote }}
  GRAFANA_USERNAME: {{ required "secrets.GRAFANA_USERNAME is required when secrets.create=true" .Values.secrets.GRAFANA_USERNAME | quote }}
  GRAFANA_PASSWORD: {{ required "secrets.GRAFANA_PASSWORD is required when secrets.create=true" .Values.secrets.GRAFANA_PASSWORD | quote }}
  GRAFANA_API_KEY: {{ .Values.secrets.GRAFANA_API_KEY | quote }}
{{- end }}
