{{- if .Values.loki.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "loki-config") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
      filesystem:
        directory: /loki/chunks
    limits_config:
      allow_structured_metadata: true
      retention_period: 168h
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "loki") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.loki.service.type }}
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: loki
  ports:
  - name: http
    port: {{ .Values.loki.service.port }}
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "loki") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.loki.replicaCount }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: loki
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loki
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.hardening.podSecurityContext | nindent 8 }}
      containers:
      - name: loki
        image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
        imagePullPolicy: {{ .Values.loki.image.pullPolicy }}
        args: ["-config.file=/etc/loki/loki.yaml", "-config.expand-env=true"]
        ports:
        - name: http
          containerPort: {{ .Values.loki.service.port }}
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        {{- if .Values.loki.storage.enabled }}
        - name: data
          mountPath: /loki
        {{- end }}
        resources:
          {{- toYaml .Values.loki.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.hardening.containerSecurityContext | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "observantio.componentFullname" (dict "root" . "name" "loki-config") }}
      {{- if .Values.loki.storage.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "observantio.componentFullname" (dict "root" . "name" "loki-data") }}
      {{- end }}
---
{{- if .Values.loki.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "loki-data") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.loki.storage.className }}
  storageClassName: {{ .Values.loki.storage.className }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.loki.storage.size }}
{{- end }}
{{- end }}

{{- if .Values.tempo.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "tempo-config") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    multitenancy_enabled: false
    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        wal:
          path: /tmp/tempo/wal
        local:
          path: /tmp/tempo/blocks
