{{- if .Values.alertmanager.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "alertmanager-config") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: watchdog-webhook
    receivers:
      - name: watchdog-webhook
        webhook_configs:
          - url: http://{{ include "observantio.componentFullname" (dict "root" . "name" "notifier") }}:{{ .Values.notifier.service.port }}/internal/v1/alertmanager/alerts/webhook
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /tmp/inbound_webhook_token
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "alertmanager") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.alertmanager.service.type }}
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
  ports:
  - name: http
    port: {{ .Values.alertmanager.service.port }}
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "alertmanager") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.alertmanager.replicaCount }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: alertmanager
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: alertmanager
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.hardening.podSecurityContext | nindent 8 }}
      containers:
      - name: alertmanager
        image: "{{ .Values.alertmanager.image.repository }}:{{ .Values.alertmanager.image.tag }}"
        imagePullPolicy: {{ .Values.alertmanager.image.pullPolicy }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          umask 077
          printf "%s" "$INBOUND_WEBHOOK_TOKEN" > /tmp/inbound_webhook_token
          exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
        ports:
        - name: http
          containerPort: {{ .Values.alertmanager.service.port }}
        envFrom:
        - secretRef:
            name: {{ include "observantio.fullname" . }}-secrets
        readinessProbe:
          httpGet:
            path: /-/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        {{- if .Values.alertmanager.storage.enabled }}
        - name: data
          mountPath: /alertmanager
        {{- end }}
        resources:
          {{- toYaml .Values.alertmanager.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.hardening.containerSecurityContext | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "observantio.componentFullname" (dict "root" . "name" "alertmanager-config") }}
      {{- if .Values.alertmanager.storage.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "observantio.componentFullname" (dict "root" . "name" "alertmanager-data") }}
      {{- end }}
---
{{- if .Values.alertmanager.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "alertmanager-data") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.alertmanager.storage.className }}
  storageClassName: {{ .Values.alertmanager.storage.className }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.alertmanager.storage.size }}
{{- end }}
{{- end }}

{{- if .Values.mimir.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "mimir-config") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
data:
  mimir.yaml: |
    server:
      http_listen_port: {{ .Values.mimir.service.port }}
      grpc_listen_port: 9095
    multitenancy_enabled: false
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/blocks
    memberlist:
      join_members:
        - {{ include "observantio.componentFullname" (dict "root" . "name" "mimir") }}
    ingester:
      ring:
        replication_factor: {{ .Values.mimir.replicationFactor }}
    ruler_storage:
      backend: local
      local:
        directory: /data/ruler-storage
    ruler:
      rule_path: /ruler
      alertmanager_url: http://{{ include "observantio.componentFullname" (dict "root" . "name" "alertmanager") }}:{{ .Values.alertmanager.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "mimir") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mimir.service.type }}
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mimir
  ports:
  - name: http
    port: {{ .Values.mimir.service.port }}
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "mimir") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
