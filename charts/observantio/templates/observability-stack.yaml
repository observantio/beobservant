      - name: config
        configMap:
          name: {{ include "observantio.componentFullname" (dict "root" . "name" "mimir-config") }}
      {{- if .Values.mimir.storage.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "observantio.componentFullname" (dict "root" . "name" "mimir-data") }}
      {{- end }}
---
{{- if .Values.mimir.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "mimir-data") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.mimir.storage.className }}
