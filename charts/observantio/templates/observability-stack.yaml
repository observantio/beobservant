        image: "{{ .Values.mimir.image.repository }}:{{ .Values.mimir.image.tag }}"
        imagePullPolicy: {{ .Values.mimir.image.pullPolicy }}
        args:
        - -config.file=/etc/mimir/mimir.yaml
        - -config.expand-env=true
        - -ingester.ring.replication-factor={{ .Values.mimir.replicationFactor }}
        ports:
        - name: http
