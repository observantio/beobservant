{{- if .Values.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-datasources") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
data:
  datasources.yml: |
    apiVersion: 1
    deleteDatasources:
      - name: Mimir
      - name: Loki
      - name: Tempo
    prune: true
    datasources:
      - name: Mimir
        uid: mimir
        type: prometheus
        access: proxy
        url: http://{{ include "observantio.componentFullname" (dict "root" . "name" "mimir") }}:{{ .Values.mimir.service.port }}/prometheus
        isDefault: true
        editable: true
        jsonData:
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: ${MIMIR_TENANT_ID}
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://{{ include "observantio.componentFullname" (dict "root" . "name" "loki") }}:{{ .Values.loki.service.port }}
        editable: true
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://{{ include "observantio.componentFullname" (dict "root" . "name" "tempo") }}:3200
        editable: true
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  selector:
    {{- include "observantio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
  - name: http
    port: {{ .Values.grafana.service.port }}
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.hardening.podSecurityContext | nindent 8 }}
      containers:
      - name: grafana
        image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
        imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.grafana.service.port }}
        env:
        {{- range $k, $v := .Values.grafana.env }}
        - name: {{ $k }}
          value: {{ tpl ($v | toString) $ | quote }}
        {{- end }}
        envFrom:
        - secretRef:
            name: {{ include "observantio.fullname" . }}-secrets
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        {{- if .Values.grafana.storage.enabled }}
        - name: data
          mountPath: /var/lib/grafana
        {{- end }}
        resources:
          {{- toYaml .Values.grafana.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.hardening.containerSecurityContext | nindent 10 }}
      volumes:
      - name: datasources
        configMap:
          name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-datasources") }}
      {{- if .Values.grafana.storage.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-data") }}
      {{- end }}
---
{{- if .Values.grafana.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "grafana-data") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.grafana.storage.className }}
  storageClassName: {{ .Values.grafana.storage.className }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.grafana.storage.size }}
{{- end }}
{{- end }}
