{{- if .Values.gatekeeper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.componentFullname" (dict "root" . "name" "gatekeeper") }}
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gatekeeper.replicaCount }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gatekeeper
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gatekeeper
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- include "observantio.podSecurityContextFor" (dict "root" . "component" .Values.gatekeeper) | nindent 8 }}
      {{- with .Values.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.scheduling.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  {{- include "observantio.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: gatekeeper
      {{- end }}
      {{- if .Values.scheduling.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
      - maxSkew: {{ .Values.scheduling.topologySpreadConstraints.maxSkew }}
        topologyKey: {{ .Values.scheduling.topologySpreadConstraints.topologyKey }}
        whenUnsatisfiable: {{ .Values.scheduling.topologySpreadConstraints.whenUnsatisfiable }}
        labelSelector:
          matchLabels:
            {{- include "observantio.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: gatekeeper
      {{- end }}
      serviceAccountName: {{ include "observantio.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: gatekeeper
        image: "{{ .Values.gatekeeper.image.repository }}:{{ .Values.gatekeeper.image.tag }}"
        imagePullPolicy: {{ .Values.gatekeeper.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.gatekeeper.service.port }}
          name: http
        env:
        {{- range $k, $v := .Values.gatekeeper.env }}
        - name: {{ $k }}
          value: {{ tpl ($v | toString) $ | quote }}
        {{- end }}
        envFrom:
        - secretRef:
            name: {{ include "observantio.secretName" . }}
        livenessProbe:
          httpGet:
            path: {{ .Values.gatekeeper.probes.path }}
            port: http
          initialDelaySeconds: {{ .Values.gatekeeper.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.gatekeeper.probes.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.gatekeeper.probes.path }}
            port: http
          initialDelaySeconds: {{ .Values.gatekeeper.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.gatekeeper.probes.periodSeconds }}
        resources:
          {{- toYaml .Values.gatekeeper.resources | nindent 10 }}
        securityContext:
          {{- include "observantio.containerSecurityContextFor" (dict "root" . "component" .Values.gatekeeper "name" "gatekeeper") | nindent 10 }}
{{- end }}
