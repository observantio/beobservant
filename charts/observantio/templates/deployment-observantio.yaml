{{- if .Values.observantio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observantio.fullname" . }}-observantio
  labels:
    {{- include "observantio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.observantio.replicaCount }}
  selector:
    matchLabels:
      {{- include "observantio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: observantio
  template:
    metadata:
      labels:
        {{- include "observantio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: observantio
    spec:
      automountServiceAccountToken: {{ .Values.hardening.automountServiceAccountToken }}
      securityContext:
        {{- include "observantio.podSecurityContextFor" (dict "root" . "component" .Values.observantio) | nindent 8 }}
      {{- with .Values.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.scheduling.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  {{- include "observantio.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: observantio
      {{- end }}
      {{- if .Values.scheduling.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
      - maxSkew: {{ .Values.scheduling.topologySpreadConstraints.maxSkew }}
        topologyKey: {{ .Values.scheduling.topologySpreadConstraints.topologyKey }}
        whenUnsatisfiable: {{ .Values.scheduling.topologySpreadConstraints.whenUnsatisfiable }}
        labelSelector:
          matchLabels:
            {{- include "observantio.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: observantio
      {{- end }}
      serviceAccountName: {{ include "observantio.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: observantio
        image: "{{ .Values.observantio.image.repository }}:{{ .Values.observantio.image.tag }}"
        imagePullPolicy: {{ .Values.observantio.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.observantio.service.port }}
          name: http
        env:
        {{- range $k, $v := .Values.observantio.env }}
        - name: {{ $k }}
          value: {{ tpl ($v | toString) $ | quote }}
        {{- end }}
        {{- if .Values.internalTLS.enabled }}
        - name: SSL_ENABLED
          value: "true"
        - name: SSL_CERTFILE
          value: /etc/observantio/internal-tls/tls.crt
        - name: SSL_KEYFILE
          value: /etc/observantio/internal-tls/tls.key
        {{- end }}
        envFrom:
        - secretRef:
            name: {{ include "observantio.secretName" . }}
        {{- if .Values.internalTLS.enabled }}
        volumeMounts:
        - name: internal-ca
          mountPath: /etc/observantio/internal-ca
          readOnly: true
        - name: internal-tls
          mountPath: /etc/observantio/internal-tls
          readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: {{ .Values.observantio.probes.path }}
            port: http
            {{- if .Values.internalTLS.enabled }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: {{ .Values.observantio.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.observantio.probes.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.observantio.probes.path }}
            port: http
            {{- if .Values.internalTLS.enabled }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: {{ .Values.observantio.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.observantio.probes.periodSeconds }}
        resources:
          {{- toYaml .Values.observantio.resources | nindent 10 }}
        securityContext:
          {{- include "observantio.containerSecurityContextFor" (dict "root" . "component" .Values.observantio "name" "observantio") | nindent 10 }}
      {{- if .Values.internalTLS.enabled }}
      volumes:
      - name: internal-ca
        secret:
          secretName: {{ include "observantio.internalTLSSecretName" . }}
          items:
          - key: {{ .Values.internalTLS.caKey }}
            path: ca.crt
      - name: internal-tls
        secret:
          secretName: {{ include "observantio.internalTLSSecretName" . }}
          items:
          - key: {{ .Values.internalTLS.observantioCertKey }}
            path: tls.crt
          - key: {{ .Values.internalTLS.observantioKeyKey }}
            path: tls.key
      {{- end }}
{{- end }}
