scheduling:
  podAntiAffinity:
    enabled: false
  topologySpreadConstraints:
    enabled: false

internalTLS:
  enabled: false

networkPolicy:
  enabled: true
  allowAllExternalEgress: true
  allowExternalEgressCidrs: []

autoscaling:
  observantio:
    enabled: false
  gatekeeper:
    enabled: false
  notifier:
    enabled: false
  resolver:
    enabled: false

observantio:
  replicaCount: 1
  env:
    CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
    CORS_ALLOW_CREDENTIALS: "true"
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi

gatekeeper:
  enabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

notifier:
  replicaCount: 1
  tls:
    enabled: false
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

resolver:
  replicaCount: 1
  tls:
    enabled: false
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi

otlpGateway:
  replicaCount: 1
  publicService:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

grafanaAuthGateway:
  enforceAuth: false
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

otelAgent:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 250m
      memory: 384Mi

ui:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

loki:
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 768Mi

tempo:
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 768Mi

mimir:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

alertmanager:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

grafana:
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgres:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

redis:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
