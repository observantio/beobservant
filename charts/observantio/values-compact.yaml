scheduling:
  podAntiAffinity:
    enabled: false
  topologySpreadConstraints:
    enabled: false

internalTLS:
  enabled: false

networkPolicy:
  enabled: true
  allowAllExternalEgress: true
  allowExternalEgressCidrs: []

autoscaling:
  observantio:
    enabled: false
  gatekeeper:
    enabled: false
  notifier:
    enabled: false
  resolver:
    enabled: false

observantio:
  replicaCount: 1
  env:
    CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
    CORS_ALLOW_CREDENTIALS: "true"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

gatekeeper:
  enabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

notifier:
  replicaCount: 1
  tls:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 192Mi

resolver:
  replicaCount: 1
  tls:
    enabled: false
  resources:
    requests:
      cpu: 150m
      memory: 256Mi

otlpGateway:
  replicaCount: 1
  publicService:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

grafanaAuthGateway:
  enforceAuth: false
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

otelAgent:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 192Mi

ui:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

loki:
  resources:
    requests:
      cpu: 150m
      memory: 256Mi

tempo:
  resources:
    requests:
      cpu: 150m
      memory: 256Mi

mimir:
  resources:
    requests:
      cpu: 200m
      memory: 384Mi

alertmanager:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

grafana:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

postgres:
  resources:
    requests:
      cpu: 150m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
