repos:
  - repo: local
    hooks:
      - id: server-unit-tests
        name: Watchdog unit tests
        language: system
        entry: >-
          bash -lc 'VENV_PY="$PWD/.venv/bin/python"; cd watchdog && "$VENV_PY" -m pytest -q
          -o cache_dir=/tmp/pre-commit-pytest-cache-watchdog --ignore=mutants'
        pass_filenames: false
        files: ^watchdog/.*\.py$
        exclude: (^|/)tests/
        types: [python]

      - id: gateway-auth-unit-tests
        name: Gatekeeper unit tests
        language: system
        entry: >-
          bash -lc 'VENV_PY="$PWD/.venv/bin/python"; cd gatekeeper && "$VENV_PY" -m pytest -q
          -o cache_dir=/tmp/pre-commit-pytest-cache-gatekeeper'
        pass_filenames: false
        files: ^gatekeeper/.*\.py$
        exclude: (^|/)tests/
        types: [python]

      - id: watchdog-mypy
        name: Watchdog mypy
        language: system
        pass_filenames: false
        entry: >-
          bash -lc 'VENV_PY="$PWD/.venv/bin/python"; APP_ENV=development; ENVIRONMENT=development; VAULT_ENABLED=false; DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/watchdog; NOTIFIER_DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/notifier; RESOLVER_DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/resolver; CORS_ORIGINS=http://localhost:3000; CORS_ALLOW_CREDENTIALS=true; JWT_AUTO_GENERATE_KEYS=true; GATEWAY_INTERNAL_SERVICE_TOKEN=ci_gateway_internal_service_token_123456789; NOTIFIER_EXPECTED_SERVICE_TOKEN=ci_notifier_expected_service_token_123456789; NOTIFIER_SERVICE_TOKEN=ci_notifier_service_token_123456789; NOTIFIER_CONTEXT_VERIFY_KEY=ci_notifier_context_verify_key_12345678901234567890; NOTIFIER_CONTEXT_SIGNING_KEY=ci_notifier_context_signing_key_12345678901234567890; RESOLVER_EXPECTED_SERVICE_TOKEN=ci_resolver_expected_service_token_123456789; RESOLVER_SERVICE_TOKEN=ci_resolver_service_token_123456789; RESOLVER_CONTEXT_VERIFY_KEY=ci_resolver_context_verify_key_12345678901234567890; RESOLVER_CONTEXT_SIGNING_KEY=ci_resolver_context_signing_key_12345678901234567890; INBOUND_WEBHOOK_TOKEN=ci_inbound_webhook_token_123456789; cd watchdog && PYTHONPATH=$PWD "$VENV_PY" -m mypy --cache-dir /tmp/watchdog-mypy-cache --config-file "$PWD/../pyproject.toml" .'
        files: ^watchdog/.*\.py$
        exclude: (^|/)tests/
        types: [python]

      - id: watchdog-pylint
        name: Watchdog pylint
        language: system
        entry: >-
          bash -lc 'cd "$PWD" && export APP_ENV=development ENVIRONMENT=development VAULT_ENABLED=false DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/watchdog NOTIFIER_DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/notifier RESOLVER_DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/resolver CORS_ORIGINS=http://localhost:3000 CORS_ALLOW_CREDENTIALS=true JWT_AUTO_GENERATE_KEYS=true GATEWAY_INTERNAL_SERVICE_TOKEN=ci_gateway_internal_service_token_123456789 NOTIFIER_EXPECTED_SERVICE_TOKEN=ci_notifier_expected_service_token_123456789 NOTIFIER_SERVICE_TOKEN=ci_notifier_service_token_123456789 NOTIFIER_CONTEXT_VERIFY_KEY=ci_notifier_context_verify_key_12345678901234567890 NOTIFIER_CONTEXT_SIGNING_KEY=ci_notifier_context_signing_key_12345678901234567890 RESOLVER_EXPECTED_SERVICE_TOKEN=ci_resolver_expected_service_token_123456789 RESOLVER_SERVICE_TOKEN=ci_resolver_service_token_123456789 RESOLVER_CONTEXT_VERIFY_KEY=ci_resolver_context_verify_key_12345678901234567890 RESOLVER_CONTEXT_SIGNING_KEY=ci_resolver_context_signing_key_12345678901234567890 INBOUND_WEBHOOK_TOKEN=ci_inbound_webhook_token_123456789 PYLINT_PATH_FIRST=watchdog &&
          "$PWD/.venv/bin/python" -m pylint --rcfile "$PWD/pyproject.toml" watchdog'
        pass_filenames: false
        files: ^watchdog/.*\.py$
        exclude: (^|/)tests/
        types: [python]

      - id: gatekeeper-mypy
        name: Gatekeeper mypy
        language: system
        pass_filenames: false
        entry: >-
          bash -lc 'VENV_PY="$PWD/.venv/bin/python"; APP_ENV=development; ENVIRONMENT=development; VAULT_ENABLED=false; DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/watchdog; NOTIFIER_DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/notifier; RESOLVER_DATABASE_URL=postgresql://ci_user:ci_password_123@localhost:5432/resolver; CORS_ORIGINS=http://localhost:3000; CORS_ALLOW_CREDENTIALS=true; JWT_AUTO_GENERATE_KEYS=true; GATEWAY_INTERNAL_SERVICE_TOKEN=ci_gateway_internal_service_token_123456789; NOTIFIER_EXPECTED_SERVICE_TOKEN=ci_notifier_expected_service_token_123456789; NOTIFIER_SERVICE_TOKEN=ci_notifier_service_token_123456789; NOTIFIER_CONTEXT_VERIFY_KEY=ci_notifier_context_verify_key_12345678901234567890; NOTIFIER_CONTEXT_SIGNING_KEY=ci_notifier_context_signing_key_12345678901234567890; RESOLVER_EXPECTED_SERVICE_TOKEN=ci_resolver_expected_service_token_123456789; RESOLVER_SERVICE_TOKEN=ci_resolver_service_token_123456789; RESOLVER_CONTEXT_VERIFY_KEY=ci_resolver_context_verify_key_12345678901234567890; RESOLVER_CONTEXT_SIGNING_KEY=ci_resolver_context_signing_key_12345678901234567890; INBOUND_WEBHOOK_TOKEN=ci_inbound_webhook_token_123456789; cd gatekeeper && PYTHONPATH=$PWD "$VENV_PY" -m mypy --cache-dir /tmp/gatekeeper-mypy-cache --config-file "$PWD/../pyproject.toml" .'
        files: ^gatekeeper/.*\.py$
        exclude: (^|/)tests/
        types: [python]

      - id: resolver-mypy
        name: Resolver mypy
        language: system
        pass_filenames: false
        entry: >-
          bash -lc 'R="$(git rev-parse --show-toplevel 2>/dev/null || echo "$PWD")"; P=""; for candidate in "$R/resolver/.venv/bin/python" "$R/.venv/bin/python"; do if [[ -x "$candidate" ]] && "$candidate" -c "import numpy, sqlalchemy, pydantic, httpx" 2>/dev/null; then P="$candidate"; break; fi; done; if [[ -z "$P" ]]; then echo "error: no venv with resolver deps (numpy, sqlalchemy, pydantic, httpx); pip install -e .[dev] at repo root or in resolver/" >&2; exit 1; fi; cd "$R/resolver" && PYTHONPATH="$PWD" "$P" -m mypy --python-executable "$P" --cache-dir /tmp/resolver-mypy-cache --config-file pyproject.toml .'
        files: ^resolver/.*\.py$
        exclude: (^|/)tests/
        types: [python]

      - id: resolver-pylint
        name: Resolver pylint
        language: system
        pass_filenames: false
        entry: >-
          bash -lc 'R="$(git rev-parse --show-toplevel 2>/dev/null || echo "$PWD")"; P=""; for candidate in "$R/resolver/.venv/bin/python" "$R/.venv/bin/python"; do if [[ -x "$candidate" ]] && "$candidate" -c "import numpy, sqlalchemy, pydantic, httpx" 2>/dev/null; then P="$candidate"; break; fi; done; if [[ -z "$P" ]]; then echo "error: no venv with resolver deps (numpy, sqlalchemy, pydantic, httpx); pip install -e .[dev] at repo root or in resolver/" >&2; exit 1; fi; cd "$R/resolver" && "$P" -m pylint --rcfile pyproject.toml .'
        files: ^resolver/.*\.py$
        exclude: (^|/)tests/
        types: [python]

      - id: ui-lint
        name: ui lint
        language: system
        entry: bash -lc 'cd ui && npm run lint'
        pass_filenames: false
        files: ^ui/

      - id: ui-tests
        name: ui tests
        language: system
        entry: bash -lc 'cd ui && npm run test:run'
        pass_filenames: false
        files: ^ui/

      - id: ui-build
        name: ui build
        language: system
        entry: bash -lc 'cd ui && npm run build'
        pass_filenames: false
        files: ^ui/
