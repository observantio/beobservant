[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "observantio"
version = "0.1.0"
description = "Observantio mono-repo shared developer tooling and test dependencies."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Observantio" }]
keywords = ["observability", "lgtm", "fastapi", "telemetry", "grafana"]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.18.2",
  "pylint>=3.3.0",
  "pre-commit>=4.3.0",
  "pytest>=9.0.0",
  "pytest-cov>=7.0.0",
  "pytest-asyncio>=1.3.0",
]

watchdog = [
  "fastapi",
  "starlette",
  "httpx",
  "pydantic",
  "pydantic-settings",
  "sqlalchemy",
  "uvicorn",
  "python-jose",
  "pyjwt[crypto]",
  "bcrypt",
  "passlib",
  "python-multipart",
  "email-validator",
  "cryptography",
  "psutil",
  "redis",
  "asyncpg",
  "psycopg2-binary",
  "protobuf",
  "opentelemetry-proto",
  "pyotp",
  "aiosmtplib",
  "tenacity",
  "pyyaml",
  "hvac",
]

gatekeeper = [
  "fastapi",
  "httpx",
  "pydantic",
  "sqlalchemy",
  "uvicorn",
  "redis",
]

notifier = [
  "fastapi",
  "starlette",
  "httpx",
  "pydantic",
  "pydantic-settings",
  "sqlalchemy",
  "uvicorn",
  "python-multipart",
  "cryptography",
  "pyjwt[crypto]",
  "passlib",
  "bcrypt",
  "email-validator",
  "aiosmtplib",
  "redis",
  "asyncpg",
  "psycopg2-binary",
  "tenacity",
  "pyyaml",
  "types-pyyaml",
  "pyotp",
  "hvac",
]

resolver = [
  "fastapi",
  "uvicorn[standard]",
  "httpx",
  "pydantic",
  "pydantic-settings",
  "pyjwt",
  "numpy",
  "scipy",
  "scikit-learn",
  "sqlalchemy",
  "psycopg2-binary",
  "redis",
]

test = ["observantio[dev,watchdog,gatekeeper,notifier,resolver]"]

[tool.pytest.ini_options]
minversion = "9.0"
testpaths = ["resolver/tests", "gatekeeper/tests", "notifier/tests", "watchdog/tests"]
addopts = "-q"
pythonpath = ["resolver", "gatekeeper", "notifier", "watchdog"]
asyncio_mode = "auto"

[tool.coverage.run]
branch = true
omit = ["tests/*", "ui/*", "showcase/*"]

[tool.coverage.report]
exclude_also = ["if TYPE_CHECKING:"]
show_missing = true

[tool.mypy]
python_version = "3.11"
pretty = true
show_error_codes = true
show_column_numbers = true
show_error_context = true
explicit_package_bases = true
exclude_gitignore = true
ignore_missing_imports = true
exclude = [
  "^(ui|showcase|configs|tests|build|dist|venv|\\.venv|__pycache__|watchdog/tests|gatekeeper/tests|notifier/tests|resolver/tests)/",
]

[tool.pylint.main]
jobs = 1
extension-pkg-allow-list = ["sqlalchemy", "sqlalchemy.orm"]
ignore = [".git", "__pycache__", ".mypy_cache", ".pytest_cache", ".ruff_cache", ".venv", "venv", "node_modules", "build", "dist", "tmp", "vendor"]
ignore-paths = [
  "^\\./?(?:resolver|gatekeeper|notifier|watchdog)/tests/.*$",
  "^\\./?(?:ui|showcase)/.*$",
]
init-hook = """
import os, sys
root = os.getcwd()
services = ['resolver', 'gatekeeper', 'notifier', 'watchdog']
first = (os.environ.get('PYLINT_PATH_FIRST') or '').strip()
ordered = [first, *[s for s in services if s != first]] if first in services else list(reversed(services))
for svc in reversed(ordered):
    path = f'{root}/{svc}'
    try:
        sys.path.remove(path)
    except ValueError:
        pass
    sys.path.insert(0, path)
"""

[tool.pylint.messages_control]
disable = [
  "missing-module-docstring",
  "missing-class-docstring",
  "missing-function-docstring",
  "too-many-arguments",
  "too-many-positional-arguments",
  "too-many-locals",
  "too-many-branches",
  "not-callable",
]

[tool.pylint.format]
max-line-length = 120
max-module-lines = 800

[tool.pylint.design]
max-args = 6
max-positional-arguments = 6
max-attributes = 200
max-public-methods = 35
max-returns = 30
max-nested-blocks = 6
max-statements = 180
min-public-methods = 0

[tool.pylint.basic]
variable-naming-style = "snake_case"
argument-naming-style = "snake_case"
attr-naming-style = "snake_case"
const-naming-style = "UPPER_CASE"
class-const-naming-style = "UPPER_CASE"

[tool.pylint.similarities]
min-similarity-lines = 8

[tool.hatch.build.targets.wheel]
bypass-selection = true