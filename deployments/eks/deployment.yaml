apiVersion: v1
kind: ConfigMap
metadata:
  name: otlp-envoy-config
  namespace: beobservant
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: otlp_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 4320
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: otlp_gateway
                    use_remote_address: true
                    stream_idle_timeout: 300s
                    request_timeout: 60s
                    route_config:
                      name: routes
                      virtual_hosts:
                        - name: otlp
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/loki/" }
                              route:
                                cluster: loki
                                prefix_rewrite: "/"
                                timeout: 60s
                            - match: { prefix: "/tempo/" }
                              route:
                                cluster: tempo
                                prefix_rewrite: "/"
                                timeout: 60s
                            - match: { prefix: "/mimir/" }
                              route:
                                cluster: mimir
                                prefix_rewrite: "/"
                                timeout: 60s
                            - match: { prefix: "/health" }
                              direct_response:
                                status: 200
                                body:
                                  inline_string: '{"status":"healthy","service":"otlp-gateway"}'
                    http_filters:
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          http_service:
                            server_uri:
                              uri: http://gateway-auth:4321
                              cluster: gateway-auth
                              timeout: 2s
                            path_prefix: /api/gateway/validate
                            authorization_request:
                              headers_to_add:
                                - key: X-Otlp-Token
                                  value: "%REQ(X-OTLP-TOKEN)%"
                            authorization_response:
                              allowed_upstream_headers:
                                patterns:
                                  - exact: x-scope-orgid
                          failure_mode_allow: false
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: gateway-auth
          connect_timeout: 2s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: gateway-auth
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: gateway-auth
                          port_value: 4321
        - name: loki
          connect_timeout: 5s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: loki
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: loki
                          port_value: 3100
        - name: tempo
          connect_timeout: 5s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: tempo
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: tempo
                          port_value: 4318
        - name: mimir
          connect_timeout: 5s
          type: logical_dns
          lb_policy: round_robin
          load_assignment:
            cluster_name: mimir
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: mimir
                          port_value: 9009
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: beobservant
data:
  loki.yaml: |
    auth_enabled: true
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn
    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
      filesystem:
        directory: /loki/chunks
    limits_config:
      allow_structured_metadata: true
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      retention_period: 168h
    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: beobservant
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    multitenancy_enabled: true
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 48h
    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: eks
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://mimir:9009/api/v1/push
            headers:
              X-Scope-OrgID: ${MIMIR_TENANT_ID}
            send_exemplars: true
    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks
    overrides:
      max_search_duration: 168h
      metrics_generator_processors: [service-graphs, span-metrics]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: beobservant
data:
  mimir.yaml: |
    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: info
    multitenancy_enabled: true
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data
    memberlist:
      join_members:
        - mimir
    blocks_storage:
      storage_prefix: blocks
      tsdb:
        dir: /data/tsdb
      bucket_store:
        sync_dir: /data/tsdb-sync
    ruler:
      rule_path: /data/ruler
      alertmanager_url: http://alertmanager:9093
    distributor:
      ring:
        kvstore:
          store: memberlist
    ingester:
      ring:
        kvstore:
          store: memberlist
        replication_factor: 1
    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: memberlist
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: beobservant
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: beobservant-webhook
      routes:
        - match:
            severity: critical
          receiver: critical
          continue: true
        - match:
            severity: warning
          receiver: warning
    receivers:
      - name: beobservant-webhook
        webhook_configs:
          - url: http://benotified:4323/internal/v1/alertmanager/alerts/webhook
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /tmp/inbound_webhook_token
      - name: critical
        webhook_configs:
          - url: http://benotified:4323/internal/v1/alertmanager/alerts/critical
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /tmp/inbound_webhook_token
      - name: warning
        webhook_configs:
          - url: http://benotified:4323/internal/v1/alertmanager/alerts/warning
            send_resolved: true
            http_config:
              authorization:
                type: Bearer
                credentials_file: /tmp/inbound_webhook_token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  namespace: beobservant
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Mimir
        uid: mimir
        type: prometheus
        access: proxy
        url: http://mimir:9009/prometheus
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 15s
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: ${MIMIR_TENANT_ID}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-proxy-config
  namespace: beobservant
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }

    server {
      listen 80;
      location = /healthz { return 200; }

      location = /_auth {
        internal;
        proxy_pass http://beobservant:4319/api/grafana/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
      }

      location /grafana/ {
        auth_request /_auth;
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }
---
