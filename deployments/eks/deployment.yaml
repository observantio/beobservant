apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: beobservant
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: beobservant
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-edge-ingress
  namespace: beobservant
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: ["beobservant", "ui", "grafana-proxy"]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 4319
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-core-east-west
  namespace: beobservant
spec:
  podSelector:
    matchLabels:
      access.beobservant.io/tier: core
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: access.beobservant.io/tier
                operator: In
                values: ["core", "edge"]
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: access.beobservant.io/tier
                operator: In
                values: ["core", "observability"]
    - to:
        # TODO: restrict to managed Postgres/Redis CIDR ranges.
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otlp-ingress
  namespace: beobservant
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: otlp-gateway
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 4320
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: ["gateway-auth", "loki", "tempo", "mimir"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-ingress
  namespace: beobservant
spec:
  podSelector:
    matchLabels:
      access.beobservant.io/tier: observability
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: access.beobservant.io/tier
                operator: In
                values: ["core", "edge", "observability"]
---
