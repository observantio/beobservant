apiVersion: apps/v1
kind: Deployment
metadata:
  name: beobservant
  namespace: beobservant
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: beobservant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beobservant
        access.beobservant.io/tier: core
    spec:
      serviceAccountName: beobservant-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: beobservant
          # TODO: replace with immutable image digest.
          image: ghcr.io/observantio/beobservant:stable
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4319
              name: http
          envFrom:
            - configMapRef:
                name: beobservant-config
            - secretRef:
                name: beobservant-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 20
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: beobservant
  namespace: beobservant
spec:
  selector:
    app.kubernetes.io/name: beobservant
  ports:
    - name: http
      port: 4319
      targetPort: http
---
