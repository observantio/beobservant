apiVersion: apps/v1
kind: Deployment
metadata:
  name: otlp-gateway
  namespace: beobservant
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: otlp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otlp-gateway
        access.beobservant.io/tier: edge
    spec:
      serviceAccountName: otlp-gateway-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.32-latest
          imagePullPolicy: IfNotPresent
          args: ["-c", "/etc/envoy/envoy.yaml"]
          ports:
            - containerPort: 4320
              name: otlp
            - containerPort: 9901
              name: admin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /ready
              port: admin
            failureThreshold: 18
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: envoy-config
          configMap:
            name: otlp-envoy-config
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: otlp-gateway
  namespace: beobservant
spec:
  selector:
    app.kubernetes.io/name: otlp-gateway
  ports:
    - name: otlp
      port: 4320
      targetPort: otlp
    - name: admin
      port: 9901
      targetPort: admin
