  namespace: beobservant
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: becertain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: becertain
        access.beobservant.io/tier: core
    spec:
      serviceAccountName: becertain-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: becertain
          image: ghcr.io/observantio/becertain:stable
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4322
              name: http
          envFrom:
            - configMapRef:
                name: becertain-config
            - secretRef:
                name: becertain-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 2Gi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: becertain
  namespace: beobservant
spec:
  selector:
    app.kubernetes.io/name: becertain
  ports:
    - name: http
      port: 4322
      targetPort: http
