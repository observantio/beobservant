version: "3.9"

configs:
  envoy_yaml:
    file: ../../configs/envoy.yaml
  loki_yaml:
    file: ../../configs/loki.yaml
  tempo_yaml:
    file: ../../configs/tempo.yaml
  mimir_yaml:
    file: ../../configs/mimir.yaml
  alertmanager_yaml:
    file: ../../configs/alertmanager.yaml
  grafana_datasource_yaml:
    file: ../../configs/grafana/grafana-datasource.yaml
  grafana_proxy_conf:
    file: ../../configs/grafana-proxy.conf

secrets:
  database_url:
    external: true
  redis_url:
    external: true
  becertain_database_url:
    external: true
  gateway_internal_service_token:
    external: true
  benotified_service_token:
    external: true
  benotified_context_signing_key:
    external: true
  becertain_service_token:
    external: true
  becertain_context_signing_key:
    external: true
  inbound_webhook_token:
    external: true
  data_encryption_key:
    external: true
  jwt_private_key:
    external: true
  jwt_public_key:
    external: true
  benotified_expected_service_token:
    external: true
  benotified_context_verify_key:
    external: true
  becertain_expected_service_token:
    external: true
  becertain_context_verify_key:
    external: true
  gateway_status_otlp_token:
    external: true
  grafana_admin_user:
    external: true
  grafana_admin_password:
    external: true
  mimir_tenant_id:
    external: true

volumes:
  loki_data:
  tempo_data:
  mimir_data:
  alertmanager_data:
  grafana_data:

networks:
  edge:
    driver: overlay
    attachable: false
  internal:
    driver: overlay
    attachable: false
  observability:
    driver: overlay
    attachable: false

x-deploy-defaults: &deploy_defaults
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback
  rollback_config:
    parallelism: 1
    delay: 5s
    order: stop-first
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 1m
  placement:
    constraints:
      - node.role == worker

services:
  beobservant:
    image: ghcr.io/observantio/beobservant:stable
    networks: [edge, internal, observability]
    ports:
      - target: 4319
        published: 4319
        protocol: tcp
        mode: ingress
    environment:
      APP_ENV: production
      ENABLE_API_DOCS: "false"
      DEFAULT_ADMIN_BOOTSTRAP_ENABLED: "false"
      ALLOWLIST_FAIL_OPEN: "false"
      RATE_LIMIT_BACKEND: redis
    command:
      - /bin/sh
      - -ec
      - |
        export DATABASE_URL="$$(cat /run/secrets/database_url)"
        export RATE_LIMIT_REDIS_URL="$$(cat /run/secrets/redis_url)"
        export GATEWAY_INTERNAL_SERVICE_TOKEN="$$(cat /run/secrets/gateway_internal_service_token)"
        export BENOTIFIED_SERVICE_TOKEN="$$(cat /run/secrets/benotified_service_token)"
        export BENOTIFIED_CONTEXT_SIGNING_KEY="$$(cat /run/secrets/benotified_context_signing_key)"
        export BECERTAIN_SERVICE_TOKEN="$$(cat /run/secrets/becertain_service_token)"
        export BECERTAIN_CONTEXT_SIGNING_KEY="$$(cat /run/secrets/becertain_context_signing_key)"
        export INBOUND_WEBHOOK_TOKEN="$$(cat /run/secrets/inbound_webhook_token)"
        export DATA_ENCRYPTION_KEY="$$(cat /run/secrets/data_encryption_key)"
        export JWT_PRIVATE_KEY="$$(cat /run/secrets/jwt_private_key)"
        export JWT_PUBLIC_KEY="$$(cat /run/secrets/jwt_public_key)"
        exec python -u main.py
    secrets:
      - database_url
      - redis_url
      - gateway_internal_service_token
      - benotified_service_token
      - benotified_context_signing_key
      - becertain_service_token
      - becertain_context_signing_key
      - inbound_webhook_token
      - data_encryption_key
      - jwt_private_key
      - jwt_public_key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4319/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:size=64m
    deploy:
      <<: *deploy_defaults
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  benotified:
    image: ghcr.io/observantio/benotified:stable
    networks: [internal, observability]
    environment:
      APP_ENV: production
      ENABLE_API_DOCS: "false"
      DEFAULT_ADMIN_BOOTSTRAP_ENABLED: "false"
      ALLOWLIST_FAIL_OPEN: "false"
      PORT: "4323"
    command:
      - /bin/sh
      - -ec
      - |
        export DATABASE_URL="$$(cat /run/secrets/database_url)"
        export RATE_LIMIT_REDIS_URL="$$(cat /run/secrets/redis_url)"
        export GATEWAY_INTERNAL_SERVICE_TOKEN="$$(cat /run/secrets/gateway_internal_service_token)"
        export BENOTIFIED_EXPECTED_SERVICE_TOKEN="$$(cat /run/secrets/benotified_expected_service_token)"
        export BENOTIFIED_CONTEXT_VERIFY_KEY="$$(cat /run/secrets/benotified_context_verify_key)"
        export INBOUND_WEBHOOK_TOKEN="$$(cat /run/secrets/inbound_webhook_token)"
        export DATA_ENCRYPTION_KEY="$$(cat /run/secrets/data_encryption_key)"
        exec python -u main.py
    secrets:
      - database_url
      - redis_url
      - gateway_internal_service_token
      - benotified_expected_service_token
      - benotified_context_verify_key
      - inbound_webhook_token
      - data_encryption_key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4323/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:size=64m
    deploy:
      <<: *deploy_defaults
      replicas: 2
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  becertain:
    image: ghcr.io/observantio/becertain:stable
    networks: [internal, observability]
    environment:
      APP_ENV: production
      BECERTAIN_HOST: "0.0.0.0"
      BECERTAIN_PORT: "4322"
      BECERTAIN_CONTEXT_ALGORITHMS: "HS256"
      BECERTAIN_CONTEXT_REPLAY_TTL_SECONDS: "180"
    command:
      - /bin/sh
      - -ec
      - |
        export BECERTAIN_DATABASE_URL="$$(cat /run/secrets/becertain_database_url)"
        export REDIS_URL="$$(cat /run/secrets/redis_url)"
        export BECERTAIN_EXPECTED_SERVICE_TOKEN="$$(cat /run/secrets/becertain_expected_service_token)"
        export BECERTAIN_CONTEXT_VERIFY_KEY="$$(cat /run/secrets/becertain_context_verify_key)"
        export MIMIR_TENANT_ID="$$(cat /run/secrets/mimir_tenant_id)"
        exec python -u main.py
    secrets:
      - becertain_database_url
      - redis_url
      - becertain_expected_service_token
      - becertain_context_verify_key
      - mimir_tenant_id
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4322/api/v1/ready', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:size=64m
    deploy:
      <<: *deploy_defaults
      replicas: 2
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  gateway-auth:
    image: ghcr.io/observantio/gateway-auth:stable
    networks: [internal]
    environment:
      APP_ENV: production
      ENABLE_API_DOCS: "false"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "4321"
      GATEWAY_SSL_VERIFY: "true"
      GATEWAY_ALLOWLIST_FAIL_OPEN: "false"
      GATEWAY_STARTUP_CHECK_MODE: strict
      GATEWAY_AUTH_API_URL: https://beobservant:4319/api/internal/otlp/validate
      GATEWAY_RATE_LIMIT_BACKEND: redis
    command:
      - /bin/sh
      - -ec
      - |
        export GATEWAY_INTERNAL_SERVICE_TOKEN="$$(cat /run/secrets/gateway_internal_service_token)"
        export GATEWAY_STATUS_OTLP_TOKEN="$$(cat /run/secrets/gateway_status_otlp_token)"
        export GATEWAY_RATE_LIMIT_REDIS_URL="$$(cat /run/secrets/redis_url)"
        exec python -u main.py
    secrets:
      - gateway_internal_service_token
      - gateway_status_otlp_token
      - redis_url
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4321/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:size=64m
    deploy:
      <<: *deploy_defaults
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 256M

  otlp-gateway:
    image: envoyproxy/envoy:v1.32-latest
    networks: [edge, internal, observability]
    ports:
      - target: 4320
        published: 4320
        protocol: tcp
        mode: ingress
    configs:
      - source: envoy_yaml
        target: /etc/envoy/envoy.yaml
        mode: 0444
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9901/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:size=64m
    deploy:
      <<: *deploy_defaults
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.20"
          memory: 256M

  ui:
    image: ghcr.io/observantio/beobservant-ui:stable
    networks: [edge]
    ports:
      - target: 80
        published: 5173
        protocol: tcp
        mode: ingress
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:size=64m
    deploy:
      <<: *deploy_defaults
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M

  grafana-proxy:
    image: nginx:1.27-alpine
    networks: [edge, internal]
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: ingress
    configs:
      - source: grafana_proxy_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0444
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/grafana/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /var/run:size=16m
    deploy:
      <<: *deploy_defaults
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M

  loki:
    image: grafana/loki:3.6.5
    networks: [observability]
    configs:
      - source: loki_yaml
        target: /etc/loki/loki.yaml
        mode: 0444
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3100/ready || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    deploy:
      <<: *deploy_defaults
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  tempo:
    image: grafana/tempo:2.4.1
    networks: [observability]
    configs:
      - source: tempo_yaml
        target: /etc/tempo/tempo.yaml
        mode: 0444
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    environment:
      MIMIR_TENANT_ID_FILE: /run/secrets/mimir_tenant_id
    secrets:
      - mimir_tenant_id
    volumes:
      - tempo_data:/tmp/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3200/ready || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    deploy:
      <<: *deploy_defaults
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  mimir:
    image: grafana/mimir:2.12.0
    networks: [observability]
    configs:
      - source: mimir_yaml
        target: /etc/mimir/mimir.yaml
        mode: 0444
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - mimir_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9009/ready || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    deploy:
      <<: *deploy_defaults
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    networks: [observability, internal]
    configs:
      - source: alertmanager_yaml
        target: /etc/alertmanager/alertmanager.yml
        mode: 0444
    secrets:
      - inbound_webhook_token
    command:
      - /bin/sh
      - -ec
      - |
        export INBOUND_WEBHOOK_TOKEN="$$(cat /run/secrets/inbound_webhook_token)"
        test -n "$${INBOUND_WEBHOOK_TOKEN}" &&
        umask 077 &&
        printf "%s" "$${INBOUND_WEBHOOK_TOKEN}" > /tmp/inbound_webhook_token &&
        exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9093/-/ready || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    deploy:
      <<: *deploy_defaults
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 256M

  grafana:
    image: grafana/grafana:10.4.1
    networks: [observability, internal]
    configs:
      - source: grafana_datasource_yaml
        target: /etc/grafana/provisioning/datasources/datasources.yml
        mode: 0444
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    command:
      - /bin/sh
      - -ec
      - |
        export GF_SECURITY_ADMIN_USER="$$(cat /run/secrets/grafana_admin_user)"
        export GF_SECURITY_ADMIN_PASSWORD="$$(cat /run/secrets/grafana_admin_password)"
        export GF_SERVER_ROOT_URL="https://TODO_SWARM_EDGE_HOST/grafana/"
        export GF_SERVER_SERVE_FROM_SUB_PATH=true
        exec /run.sh
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    deploy:
      <<: *deploy_defaults
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 256M
