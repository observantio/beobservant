name: UI CI

on:
  push:
    paths:
      - 'ui/**'
  pull_request:
    paths:
      - 'ui/**'

jobs:
  ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: |
          npm ci --include=optional
          npm ls @rollup/rollup-linux-x64-gnu >/dev/null 2>&1 || npm i --no-save @rollup/rollup-linux-x64-gnu

      - name: Run linters
        working-directory: ui
        run: npm run lint

      - name: Run unit tests
        working-directory: ui
        run: npm test -- --run

      - name: Build
        working-directory: ui
        run: npm run build
