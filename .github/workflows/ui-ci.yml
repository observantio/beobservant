name: UI CI

on:
  push:
    paths:
      - 'ui/**'
  pull_request:
    paths:
      - 'ui/**'

jobs:
  ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: |
          npm ci --include=optional
          npm ls @rollup/rollup-linux-x64-gnu >/dev/null 2>&1 || npm i --no-save @rollup/rollup-linux-x64-gnu

      - name: Run linters
        working-directory: ui
        run: npm run lint

      - name: Run unit tests
        working-directory: ui
        run: npm test -- --run --coverage

      - name: Enforce UI coverage = 100%
        working-directory: ui
        run: |
          node -e "const j=require('./coverage/coverage-summary.json'); const bad=[]; for(const [k,v] of Object.entries(j)){ for(const m of ['lines','branches','functions','statements']){ if(v[m].pct!==100){ bad.push({scope:k,metric:m,pct:v[m].pct}); } } } if(bad.length){ console.error('Coverage must be exactly 100% for all metrics.'); console.error(JSON.stringify(bad,null,2)); process.exit(1);} console.log('Coverage gate passed: 100% for all metrics.');"

      - name: Build
        working-directory: ui
        run: npm run build
