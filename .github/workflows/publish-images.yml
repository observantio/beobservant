name: Publish Images And Release Bundle

on:
  push:
    tags:
      - "v*"

jobs:
  resolve-versions:
    name: Resolve release versions
    runs-on: ubuntu-latest
    outputs:
      bundle_version: ${{ steps.versions.outputs.bundle_version }}
      watchdog_version: ${{ steps.versions.outputs.watchdog_version }}
      gatekeeper_version: ${{ steps.versions.outputs.gatekeeper_version }}
      ui_version: ${{ steps.versions.outputs.ui_version }}
      otel_agent_version: ${{ steps.versions.outputs.otel_agent_version }}
      notifier_version: ${{ steps.versions.outputs.notifier_version }}
      resolver_version: ${{ steps.versions.outputs.resolver_version }}
      build_watchdog: ${{ steps.versions.outputs.build_watchdog }}
      build_gatekeeper: ${{ steps.versions.outputs.build_gatekeeper }}
      build_ui: ${{ steps.versions.outputs.build_ui }}
      build_otel_agent: ${{ steps.versions.outputs.build_otel_agent }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Read versions manifest
        id: versions
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          manifest = json.loads(Path('release/versions.json').read_text(encoding='utf-8'))
          required = [
              'bundle_version',
              'watchdog',
              'gatekeeper',
              'ui',
              'otel_agent',
              'notifier',
              'resolver',
          ]
          missing = [k for k in required if not manifest.get(k)]
          if missing:
              raise SystemExit(f"release/versions.json missing keys or values: {', '.join(missing)}")

          if manifest['bundle_version'] != os.environ['GITHUB_REF_NAME']:
              raise SystemExit(
                  f"bundle_version ({manifest['bundle_version']}) must match pushed tag ({os.environ['GITHUB_REF_NAME']})"
              )

            def parse_semver(tag: str):
              match = re.fullmatch(r"v?(\d+)\.(\d+)\.(\d+)", tag)
              if not match:
                return None
              return tuple(int(part) for part in match.groups())

            current_tag = os.environ['GITHUB_REF_NAME']
            previous_tag = None

            raw_tags = subprocess.check_output(['git', 'tag'], text=True).splitlines()
            parsed_tags = []
            for tag in raw_tags:
              if tag == current_tag:
                continue
              version = parse_semver(tag)
              if version is None:
                continue
              parsed_tags.append((version, tag))

            if parsed_tags:
              parsed_tags.sort(key=lambda item: item[0])
              previous_tag = parsed_tags[-1][1]

            previous_manifest = {}
            if previous_tag is not None:
              try:
                previous_manifest = json.loads(
                  subprocess.check_output(
                    ['git', 'show', f'{previous_tag}:release/versions.json'],
                    text=True,
                  )
                )
              except subprocess.CalledProcessError:
                previous_manifest = {}

            def should_build(service_key: str) -> bool:
              prev = previous_manifest.get(service_key)
              curr = manifest.get(service_key)
              if not curr:
                return False
              if prev is None:
                return True
              return curr != prev

            build_watchdog = should_build('watchdog')
            build_gatekeeper = should_build('gatekeeper')
            build_ui = should_build('ui')
            build_otel_agent = should_build('otel_agent')

          out = Path(os.environ['GITHUB_OUTPUT'])
          with out.open('a', encoding='utf-8') as f:
              f.write(f"bundle_version={manifest['bundle_version']}\n")
              f.write(f"watchdog_version={manifest['watchdog']}\n")
              f.write(f"gatekeeper_version={manifest['gatekeeper']}\n")
              f.write(f"ui_version={manifest['ui']}\n")
              f.write(f"otel_agent_version={manifest['otel_agent']}\n")
              f.write(f"notifier_version={manifest['notifier']}\n")
              f.write(f"resolver_version={manifest['resolver']}\n")
              f.write(f"build_watchdog={'true' if build_watchdog else 'false'}\n")
              f.write(f"build_gatekeeper={'true' if build_gatekeeper else 'false'}\n")
              f.write(f"build_ui={'true' if build_ui else 'false'}\n")
              f.write(f"build_otel_agent={'true' if build_otel_agent else 'false'}\n")

            print(f"Current tag: {current_tag}")
            print(f"Previous tag: {previous_tag or 'none'}")
            print(f"Build watchdog: {build_watchdog}")
            print(f"Build gatekeeper: {build_gatekeeper}")
            print(f"Build ui: {build_ui}")
            print(f"Build otel_agent: {build_otel_agent}")
          PY

  publish-local-images:
    name: Publish local GHCR images
    runs-on: ubuntu-latest
    needs: resolve-versions
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Normalize owner for GHCR
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push watchdog
        if: needs.resolve-versions.outputs.build_watchdog == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./watchdog
          file: ./watchdog/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/watchdog:${{ needs.resolve-versions.outputs.watchdog_version }}

      - name: Build and push gatekeeper
        if: needs.resolve-versions.outputs.build_gatekeeper == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./gatekeeper
          file: ./gatekeeper/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/gatekeeper:${{ needs.resolve-versions.outputs.gatekeeper_version }}

      - name: Build and push ui
        if: needs.resolve-versions.outputs.build_ui == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/ui:${{ needs.resolve-versions.outputs.ui_version }}

      - name: Build and push otel-agent
        if: needs.resolve-versions.outputs.build_otel_agent == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./otel
          file: ./otel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/otel-agent:${{ needs.resolve-versions.outputs.otel_agent_version }}

  create-release:
    name: Create or update GitHub release
    runs-on: ubuntu-latest
    needs: [resolve-versions, publish-local-images]
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-versions.outputs.bundle_version }}

      - name: Extract changelog entry for this version
        env:
          VERSION: ${{ needs.resolve-versions.outputs.bundle_version }}
        run: |
          set -euo pipefail
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found at repository root." >&2
            exit 1
          fi
          awk -v version="$VERSION" '
            BEGIN { in_section=0; found=0 }
            /^## \[/ {
              if ($0 ~ "^## \\[" version "\\]") {
                in_section=1
                found=1
                print
                next
              }
              if (in_section==1) exit
            }
            in_section==1 { print }
            END {
              if (!found) {
                print "No changelog entry found for " version > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md > release-notes.md

      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-versions.outputs.bundle_version }}
          name: ${{ needs.resolve-versions.outputs.bundle_version }}
          body_path: release-notes.md

  release-bundle:
    name: Upload release config bundles
    runs-on: ubuntu-latest
    needs: [resolve-versions, create-release]
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64, multi]
    env:
      BUNDLE_VERSION: ${{ needs.resolve-versions.outputs.bundle_version }}
      WATCHDOG_VERSION: ${{ needs.resolve-versions.outputs.watchdog_version }}
      GATEKEEPER_VERSION: ${{ needs.resolve-versions.outputs.gatekeeper_version }}
      UI_VERSION: ${{ needs.resolve-versions.outputs.ui_version }}
      OTEL_AGENT_VERSION: ${{ needs.resolve-versions.outputs.otel_agent_version }}
      NOTIFIER_VERSION: ${{ needs.resolve-versions.outputs.notifier_version }}
      RESOLVER_VERSION: ${{ needs.resolve-versions.outputs.resolver_version }}
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Build bundle directory
        run: |
          BUNDLE_DIR="observantio-${BUNDLE_VERSION}-linux-${ARCH}"
          mkdir -p "bundle/${BUNDLE_DIR}"
          cp -r configs "bundle/${BUNDLE_DIR}/"
          cp -r scripts "bundle/${BUNDLE_DIR}/"
          cp docker-compose.prod.yml "bundle/${BUNDLE_DIR}/"
          cp release/install.sh "bundle/${BUNDLE_DIR}/install.sh"
          cp release/restart.sh "bundle/${BUNDLE_DIR}/restart.sh"
          cp release/uninstall.sh "bundle/${BUNDLE_DIR}/uninstall.sh"
          cp .env.example "bundle/${BUNDLE_DIR}/.env.example"
          cp DEPLOYMENT.md "bundle/${BUNDLE_DIR}/DEPLOYMENT.md"
          cp release/versions.json "bundle/${BUNDLE_DIR}/versions.json"
          chmod +x "bundle/${BUNDLE_DIR}/install.sh" "bundle/${BUNDLE_DIR}/restart.sh" "bundle/${BUNDLE_DIR}/uninstall.sh"
          chmod +x "bundle/${BUNDLE_DIR}/scripts/run_optimal_config.sh"

      - name: Pin bundle env metadata
        run: |
          BUNDLE_DIR="observantio-${BUNDLE_VERSION}-linux-${ARCH}"
          ENV_FILE="bundle/${BUNDLE_DIR}/.env.example"
          sed -i "s/^OBSERVANTIO_BUNDLE_VERSION=.*/OBSERVANTIO_BUNDLE_VERSION=${BUNDLE_VERSION}/" "${ENV_FILE}"
          sed -i "s/^IMAGE_TAG_WATCHDOG=.*/IMAGE_TAG_WATCHDOG=${WATCHDOG_VERSION}/" "${ENV_FILE}"
          sed -i "s/^IMAGE_TAG_GATEKEEPER=.*/IMAGE_TAG_GATEKEEPER=${GATEKEEPER_VERSION}/" "${ENV_FILE}"
          sed -i "s/^IMAGE_TAG_UI=.*/IMAGE_TAG_UI=${UI_VERSION}/" "${ENV_FILE}"
          sed -i "s/^IMAGE_TAG_OTEL_AGENT=.*/IMAGE_TAG_OTEL_AGENT=${OTEL_AGENT_VERSION}/" "${ENV_FILE}"
          sed -i "s/^IMAGE_TAG_NOTIFIER=.*/IMAGE_TAG_NOTIFIER=${NOTIFIER_VERSION}/" "${ENV_FILE}"
          sed -i "s/^IMAGE_TAG_RESOLVER=.*/IMAGE_TAG_RESOLVER=${RESOLVER_VERSION}/" "${ENV_FILE}"
          if grep -q '^RELEASE_ARCH=' "${ENV_FILE}"; then
            sed -i "s/^RELEASE_ARCH=.*/RELEASE_ARCH=${ARCH}/" "${ENV_FILE}"
          else
            printf '\nRELEASE_ARCH=%s\n' "${ARCH}" >> "${ENV_FILE}"
          fi

      - name: Build release tarball
        run: |
          BUNDLE_DIR="observantio-${BUNDLE_VERSION}-linux-${ARCH}"
          tar -czf "observantio-${BUNDLE_VERSION}-linux-${ARCH}.tar.gz" -C bundle "${BUNDLE_DIR}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUNDLE_VERSION }}
          overwrite_files: true
          files: observantio-${{ env.BUNDLE_VERSION }}-linux-${{ env.ARCH }}.tar.gz
          fail_on_unmatched_files: true

  helm-release-bundle:
    name: Upload Helm chart bundle
    runs-on: ubuntu-latest
    needs: [resolve-versions, create-release]
    permissions:
      contents: write
    env:
      BUNDLE_VERSION: ${{ needs.resolve-versions.outputs.bundle_version }}
      WATCHDOG_VERSION: ${{ needs.resolve-versions.outputs.watchdog_version }}
      GATEKEEPER_VERSION: ${{ needs.resolve-versions.outputs.gatekeeper_version }}
      UI_VERSION: ${{ needs.resolve-versions.outputs.ui_version }}
      OTEL_AGENT_VERSION: ${{ needs.resolve-versions.outputs.otel_agent_version }}
      NOTIFIER_VERSION: ${{ needs.resolve-versions.outputs.notifier_version }}
      RESOLVER_VERSION: ${{ needs.resolve-versions.outputs.resolver_version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Build Helm chart bundle directory
        run: |
          set -euo pipefail
          BUNDLE_DIR="observantio-${BUNDLE_VERSION}-helm-charts"
          mkdir -p "bundle/${BUNDLE_DIR}"
          cp -R charts/observantio/. "bundle/${BUNDLE_DIR}/"
          python - <<'PY'
          from pathlib import Path
          import os

          bundle_version = os.environ['BUNDLE_VERSION']
          chart_version = bundle_version[1:] if bundle_version.startswith('v') else bundle_version
          root = Path('bundle') / f'observantio-{bundle_version}-helm-charts'

          chart_path = root / 'Chart.yaml'
          chart_lines = chart_path.read_text(encoding='utf-8').splitlines()
          for index, line in enumerate(chart_lines):
            if line.startswith('version:'):
              chart_lines[index] = f'version: {chart_version}'
            elif line.startswith('appVersion:'):
              chart_lines[index] = f'appVersion: "{chart_version}"'
          chart_path.write_text('\n'.join(chart_lines) + '\n', encoding='utf-8')

          values_path = root / 'values.yaml'
          tag_map = {
              'observantio': os.environ['WATCHDOG_VERSION'],
              'gatekeeper': os.environ['GATEKEEPER_VERSION'],
              'notifier': os.environ['NOTIFIER_VERSION'],
              'resolver': os.environ['RESOLVER_VERSION'],
              'otelAgent': os.environ['OTEL_AGENT_VERSION'],
              'ui': os.environ['UI_VERSION'],
          }
          values_lines = values_path.read_text(encoding='utf-8').splitlines()
          current_section = None
          image_indent = None
          pending_tag_section = None

          for index, line in enumerate(values_lines):
            stripped = line.lstrip(' ')
            indent = len(line) - len(stripped)

            if indent == 0 and line.endswith(':'):
              current_section = line[:-1]
              image_indent = None
              pending_tag_section = None
              continue

            if current_section in tag_map:
              if stripped == 'image:':
                image_indent = indent
                pending_tag_section = current_section
                continue

              if pending_tag_section == current_section and image_indent is not None and indent > image_indent and stripped.startswith('tag:'):
                values_lines[index] = ' ' * indent + f'tag: {tag_map[current_section]}'
                pending_tag_section = None

          values_path.write_text('\n'.join(values_lines) + '\n', encoding='utf-8')
          PY
          chmod +x "bundle/${BUNDLE_DIR}/installer.sh"

      - name: Build Helm chart tarball
        run: |
          BUNDLE_DIR="observantio-${BUNDLE_VERSION}-helm-charts"
          tar -czf "observantio-${BUNDLE_VERSION}-helm-charts.tar.gz" -C bundle "${BUNDLE_DIR}"

      - name: Upload Helm chart release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUNDLE_VERSION }}
          overwrite_files: true
          files: observantio-${{ env.BUNDLE_VERSION }}-helm-charts.tar.gz
          fail_on_unmatched_files: true
