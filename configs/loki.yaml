auth_enabled: true

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn
  grpc_server_max_recv_msg_size: 8388608
  grpc_server_max_send_msg_size: 8388608

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 128
      ttl: 1h

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 128
        ttl: 10m
  cache_results: true
  parallelise_shardable_queries: true

frontend:
  compress_responses: true
  log_queries_longer_than: 5s

ingester:
  # Larger chunks reduce flush/index churn on small homelab CPUs.
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  max_chunk_age: 30m
  chunk_target_size: 1048576
  chunk_encoding: snappy
  flush_check_period: 1m
  wal:
    dir: /loki/wal
    enabled: true
    flush_on_shutdown: true
    checkpoint_duration: 5m
    replay_memory_ceiling: 256MB

limits_config:
  allow_structured_metadata: true

  reject_old_samples: true
  reject_old_samples_max_age: 168h

  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 8
  max_streams_per_user: 1000
  max_global_streams_per_user: 1000
  per_stream_rate_limit: 1MB
  per_stream_rate_limit_burst: 4MB
  max_query_series: 2000
  max_entries_limit_per_query: 10000
  max_query_parallelism: 2
  query_timeout: 1m
  split_queries_by_interval: 15m
  retention_period: 168h
  volume_enabled: true

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 3
  delete_request_store: filesystem
