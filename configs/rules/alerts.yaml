groups:
  - name: Beobservant_Alerts
    interval: 30s
    rules:
      - alert: BeobservantDown
        expr: up{job="beobservant"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Beobservant instance down"
          description: "Beobservant instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: BeobservantHighMemory
        expr: |
          (container_memory_usage_bytes{job="beobservant"} 
          / container_spec_memory_limit_bytes{job="beobservant"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Beobservant high memory usage"
          description: "Beobservant instance {{ $labels.instance }} memory usage above 90%"

      - alert: BeobservantHighMetricCount
        expr: custom_app_metrics_total > 100000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High metric count in Beobservant"
          description: "Beobservant has {{ $value }} metrics stored, consider increasing cleanup frequency"

      - alert: BeobservantNoActiveHosts
        expr: custom_app_hosts_active == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No active hosts in Beobservant"
          description: "Beobservant has no active hosts reporting metrics"

  - name: infrastructure_alerts
    interval: 30s
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Kafka consumer lag"
          description: "Consumer group {{ $labels.group }} has lag of {{ $value }}"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total[5m])) by (job) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "{{ $labels.job }} error rate is {{ $value | humanizePercentage }}"

      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target down"
          description: "{{ $labels.job }} target {{ $labels.instance }} is down"